[constraints]
max_cycles = 0
max_coupling = "A"
max_cc = 60
no_god_files = true

[[layers]]
name = "entrypoints"
paths = [
  "cmd/durak/*",
]
order = 0

[[layers]]
name = "adapters"
paths = [
  "internal/adapters/cli/*",
  "internal/adapters/textcmd/*",
  "internal/adapters/bot/*",
  "internal/adapters/ai/*",
  "internal/adapters/storage/*",
]
order = 1

[[layers]]
name = "application"
paths = [
  "internal/app/*",
]
order = 2

[[layers]]
name = "domain"
paths = [
  "internal/domain/*",
]
order = 3

[[boundaries]]
from = "internal/domain/*"
to = "internal/app/*"
reason = "Domain rules must not depend on application orchestration."

[[boundaries]]
from = "internal/domain/*"
to = "internal/adapters/*"
reason = "Domain rules must stay independent from CLI, bot, TUI, SSH, and storage adapters."

[[boundaries]]
from = "internal/domain/*"
to = "cmd/*"
reason = "Domain rules must be callable outside executable entrypoints."

[[boundaries]]
from = "internal/app/*"
to = "internal/adapters/*"
reason = "Application/session services expose ports; adapters implement or call them."

[[boundaries]]
from = "internal/app/*"
to = "cmd/*"
reason = "Application/session logic must be reusable outside executable wiring."

[[boundaries]]
from = "internal/adapters/cli/*"
to = "internal/adapters/bot/*"
reason = "CLI must not coordinate bot strategy directly; wiring belongs in cmd or app."

[[boundaries]]
from = "internal/adapters/cli/*"
to = "internal/adapters/ai/*"
reason = "CLI must not coordinate AI players directly; wiring belongs in cmd or app."

[[boundaries]]
from = "internal/adapters/bot/*"
to = "internal/adapters/cli/*"
reason = "Bot strategies must stay independent from presentation."

[[boundaries]]
from = "internal/adapters/bot/*"
to = "internal/adapters/ai/*"
reason = "Bot strategies must stay independent from AI provider adapters."

[[boundaries]]
from = "internal/adapters/ai/*"
to = "internal/adapters/cli/*"
reason = "AI player adapters must not depend on interactive CLI loops or rendering."

[[boundaries]]
from = "internal/adapters/ai/*"
to = "internal/adapters/bot/*"
reason = "AI player adapters should not depend on concrete bot strategies; compose fallbacks through app.PlayerController."

[[boundaries]]
from = "internal/adapters/textcmd/*"
to = "internal/adapters/cli/*"
reason = "Shared command parsing must not depend on CLI rendering or loops."

[[boundaries]]
from = "internal/adapters/textcmd/*"
to = "internal/adapters/bot/*"
reason = "Shared command parsing must not depend on bot strategy implementations."

[[boundaries]]
from = "internal/adapters/textcmd/*"
to = "internal/adapters/ai/*"
reason = "Shared command parsing must not depend on AI player adapters."

[[boundaries]]
from = "internal/adapters/textcmd/*"
to = "internal/adapters/storage/*"
reason = "Shared command parsing must not depend on persistence adapters."
